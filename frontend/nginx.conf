# Production server block for the frontend's Nginx runtime image.
# Installed as /etc/nginx/conf.d/default.conf, replacing the base image's
# own default (port-80) server block.

server {
    listen 8080;
    server_name _;

    server_tokens off;

    client_max_body_size 20m;

    root /usr/share/nginx/html;
    index index.html;

    # Applies to every location below unless a location defines its own
    # add_header set (nginx does not merge add_header across levels once a
    # more specific level declares any of its own — the /static/ and
    # /index.html blocks below repeat these three for that reason).
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    # Liveness/readiness endpoint for the frontend container itself.
    location = /healthz {
        default_type text/plain;
        return 200 "ok\n";
    }

    # Reverse proxy to the backend API. proxy_pass has no URI component
    # after the host:port, so nginx forwards the request with its original
    # path unchanged (e.g. /api/items stays /api/items) — required because
    # the backend's own router is mounted under the /api prefix.
    location /api/ {
        proxy_pass http://backend:8000;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Fingerprinted CRA build assets (build/static/**) — safe to cache
    # indefinitely since their filenames change on every content change.
    location /static/ {
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy no-referrer always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # The SPA shell must never be cached — clients need the latest
    # reference to the current fingerprinted asset filenames after a
    # deploy. Matched both for direct requests and for the try_files
    # fallback below (which internally redirects to this exact URI).
    location = /index.html {
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy no-referrer always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Client-side routing (React Router, BrowserRouter): serve the
    # requested file if it exists on disk, otherwise fall back to the SPA
    # shell so the client can resolve the route.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
