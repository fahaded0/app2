# Docker Compose authenticated production stack.
#
# Production Package 5:
# - Retains Package 4 MongoDB authentication and explicit persistence.
# - Adds a dedicated TLS-terminating Nginx edge service.
# - Supplies the certificate chain and private key as service-scoped secrets.
# - Publishes only the TLS edge HTTPS endpoint.
# - Keeps frontend, backend, and MongoDB ports unpublished.
# - Proxies /api/ directly to backend and all other requests to frontend.
# - Restricts the edge to TLS 1.2 and TLS 1.3.
#
# The single-node MongoDB replica set enables multi-document transactions but
# provides no high availability or automatic failover. That infrastructure
# limitation requires separate documented risk acceptance before deployment.
#
# Prepare the MongoDB secret files:
#   powershell -NoProfile -ExecutionPolicy Bypass `
#     -File .\deploy\mongo\prepare-secrets.ps1
#
# Place the approved PEM certificate chain and unencrypted PEM private key at
# the paths configured by TLS_CERTIFICATE_FILE and TLS_PRIVATE_KEY_FILE.
# Certificate issuance, hostname validation, renewal, and expiry monitoring
# remain operational responsibilities of the internal certificate owner.
#
# Then:
#   Copy-Item .env.production.example .env.production
#   # Populate JWT_SECRET and review every variable.
#   docker compose --env-file .env.production `
#     -f docker-compose.production.yml config
#   docker compose --env-file .env.production `
#     -f docker-compose.production.yml up -d --build
#
# Never use prepare-secrets.ps1 -Force against populated production volumes.
# Replacing a MongoDB password file does not rotate an existing database user.
#
# No plaintext HTTP host listener is published by this stack.
# Package 7 adds backup, restore, and restore-drill tooling.
x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "${LOG_MAX_SIZE:-10m}"
    max-file: "${LOG_MAX_FILES:-5}"

services:

  mongo:
    image: mongo:8.0@sha256:721f8fe7ae88f6acee8c163a358f726cef6dfc4181b9d3ca77212a0cef6b781c

    # Compose file-backed secrets are normally mounted read-only with host-side
    # ownership. MongoDB requires a private keyfile, so copy it into the
    # container's ephemeral filesystem and enforce ownership/mode before
    # invoking the official image entrypoint.
    entrypoint:
      - bash
      - -ec
      - |
        set -Eeuo pipefail

        root_username_source=/run/secrets/mongo_root_username
        root_password_source=/run/secrets/mongo_root_password
        key_source=/run/secrets/mongo_replica_set_key

        secret_dir=/tmp/app2-mongo-secrets
        root_username_target="$${secret_dir}/root-username"
        root_password_target="$${secret_dir}/root-password"
        key_target="$${secret_dir}/replica-set-keyfile"

        test -s "$$root_username_source"
        test -s "$$root_password_source"
        test -s "$$key_source"

        rm -rf "$$secret_dir"
        mkdir -p "$$secret_dir"
        chmod 0700 "$$secret_dir"

        cp "$$root_username_source" "$$root_username_target"
        cp "$$root_password_source" "$$root_password_target"
        cp "$$key_source" "$$key_target"

        chmod 0400 "$$root_username_target"
        chmod 0400 "$$root_password_target"
        chmod 0400 "$$key_target"

        chown mongodb:mongodb "$$root_username_target"
        chown mongodb:mongodb "$$root_password_target"
        chown mongodb:mongodb "$$key_target"
        chown mongodb:mongodb "$$secret_dir"

        export MONGO_INITDB_ROOT_USERNAME_FILE="$$root_username_target"
        export MONGO_INITDB_ROOT_PASSWORD_FILE="$$root_password_target"

        exec docker-entrypoint.sh mongod \
          --replSet rs0 \
          --bind_ip_all \
          --keyFile "$$key_target"

    environment:
      MONGO_INITDB_ROOT_USERNAME_FILE: /run/secrets/mongo_root_username
      MONGO_INITDB_ROOT_PASSWORD_FILE: /run/secrets/mongo_root_password

    secrets:
      - source: mongo_root_username
        target: mongo_root_username
      - source: mongo_root_password
        target: mongo_root_password
      - source: mongo_replica_set_key
        target: mongo_replica_set_key

    restart: unless-stopped

    volumes:
      - type: volume
        source: mongo_data
        target: /data/db
        volume:
          nocopy: true

      - type: volume
        source: mongo_config
        target: /data/configdb
        volume:
          nocopy: true

    networks:
      - data

    healthcheck:
      test:
        - CMD-SHELL
        - >-
          root_user="$$(cat /run/secrets/mongo_root_username)" &&
          root_password="$$(cat /run/secrets/mongo_root_password)" &&
          mongosh
          --host 127.0.0.1
          --port 27017
          --username "$$root_user"
          --password "$$root_password"
          --authenticationDatabase admin
          --quiet
          --eval "db.adminCommand({ ping: 1 }).ok"
          | grep -q 1
      interval: 5s
      timeout: 10s
      retries: 36
      start_period: 20s

    stop_grace_period: 60s
    logging: *default-logging

    security_opt:
      - no-new-privileges:true

  mongo-init:
    image: mongo:8.0@sha256:721f8fe7ae88f6acee8c163a358f726cef6dfc4181b9d3ca77212a0cef6b781c

    depends_on:
      mongo:
        condition: service_healthy

    environment:
      DB_NAME: "${DB_NAME:-medstock}"

    secrets:
      - source: mongo_root_username
        target: mongo_root_username
      - source: mongo_root_password
        target: mongo_root_password
      - source: mongo_app_username
        target: mongo_app_username
      - source: mongo_app_password
        target: mongo_app_password

    command:
      - bash
      - -ec
      - |
        set -Eeuo pipefail

        root_user="$$(cat /run/secrets/mongo_root_username)"
        root_password="$$(cat /run/secrets/mongo_root_password)"
        app_user="$$(cat /run/secrets/mongo_app_username)"
        app_password="$$(cat /run/secrets/mongo_app_password)"

        test -n "$$root_user"
        test -n "$$root_password"
        test -n "$$app_user"
        test -n "$$app_password"
        test -n "$$DB_NAME"

        export APP_DB="$$DB_NAME"
        export APP_USER="$$app_user"
        export APP_PASSWORD="$$app_password"

        root_mongosh() {
          mongosh \
            --host mongo \
            --port 27017 \
            --username "$$root_user" \
            --password "$$root_password" \
            --authenticationDatabase admin \
            --quiet \
            "$$@"
        }

        rs_ready="$$(root_mongosh --eval '
          try {
            print(rs.status().ok);
          } catch (error) {
            if (
              error.code === 94 ||
              error.codeName === "NotYetInitialized"
            ) {
              print(0);
            } else {
              throw error;
            }
          }
        ' | tail -n 1)"

        if [ "$$rs_ready" != "1" ]; then
          root_mongosh --eval '
            rs.initiate({
              _id: "rs0",
              members: [
                { _id: 0, host: "mongo:27017" }
              ]
            });
          '
        fi

        until [ "$$(root_mongosh --eval '
          print(db.hello().isWritablePrimary);
        ' | tail -n 1)" = "true" ]
        do
          sleep 1
        done

        root_mongosh "$$APP_DB" --eval '
          const target = db.getSiblingDB(process.env.APP_DB);
          const user = process.env.APP_USER;
          const password = process.env.APP_PASSWORD;
          const roles = [
            {
              role: "readWrite",
              db: process.env.APP_DB
            }
          ];

          const existing = target.getUser(user);

          if (!existing) {
            target.createUser({
              user,
              pwd: password,
              roles
            });
          } else {
            target.updateUser(user, {
              pwd: password,
              roles
            });
          }
        '

        mongosh \
          --host mongo \
          --port 27017 \
          --username "$$app_user" \
          --password "$$app_password" \
          --authenticationDatabase "$$APP_DB" \
          "$$APP_DB" \
          --quiet \
          --eval '
            const status = db.runCommand({
              connectionStatus: 1
            });

            const expectedDb = process.env.APP_DB;

            const rolePresent =
              status.authInfo.authenticatedUserRoles.some(
                role =>
                  role.role === "readWrite" &&
                  role.db === expectedDb
              );

            if (!rolePresent) {
              throw new Error(
                "Application user does not have the expected scoped role."
              );
            }
          '

        echo "rs0 PRIMARY and scoped application user ready"

    restart: "no"

    networks:
      - data

    logging: *default-logging

    security_opt:
      - no-new-privileges:true

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    image: "app2-backend:${APP_IMAGE_TAG:-local}"

    # The bootstrap starts as root only to read root-owned 0600 Compose
    # secrets. It drops supplementary groups and switches permanently to
    # appuser UID/GID 10001 before replacing itself with Uvicorn.
    user: "0:0"
    restart: unless-stopped

    # Exactly one backend process/container is permitted. The image starts one
    # Uvicorn worker because scheduler/reconciliation loops lack leader
    # election. Do not scale this service until that limitation is resolved.
    deploy:
      replicas: 1

    depends_on:
      mongo-init:
        condition: service_completed_successfully

    environment:
      APP_ENV: production
      DB_NAME: "${DB_NAME:-medstock}"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set in .env.production}"
      COOKIE_SECURE: "${COOKIE_SECURE:-true}"
      COOKIE_SAMESITE: "${COOKIE_SAMESITE:-lax}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-}"
      SEED_DATA_ENABLED: "false"
      ADMIN_EMAIL: ""
      ADMIN_PASSWORD: ""
      TRANSACTION_TEST_HOOKS_ENABLED: "false"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      SENDER_EMAIL: "${SENDER_EMAIL:-onboarding@resend.dev}"
      APP_URL: "${APP_URL:-}"

    secrets:
      - source: mongo_app_username
        target: mongo_app_username
      - source: mongo_app_password
        target: mongo_app_password

    # Construct the authenticated URI inside the running container instead of
    # placing the password in Compose environment metadata. Root is used only
    # to read the root-owned secret mounts. The bootstrap then clears
    # supplementary groups, switches to UID/GID 10001, and uses os.execvp so
    # non-root Uvicorn remains PID 1 and receives SIGTERM directly.
    command:
      - python
      - -c
      - |
        import os
        from pathlib import Path
        from urllib.parse import quote

        APP_UID = 10001
        APP_GID = 10001

        def read_secret(path: str) -> str:
            value = Path(path).read_text(encoding="utf-8").strip()
            if not value:
                raise RuntimeError(f"Required secret is empty: {path}")
            return value

        username = quote(
            read_secret("/run/secrets/mongo_app_username"),
            safe="",
        )
        password = quote(
            read_secret("/run/secrets/mongo_app_password"),
            safe="",
        )
        db_name_raw = os.environ["DB_NAME"].strip()

        if not db_name_raw:
            raise RuntimeError("DB_NAME is empty.")

        db_name = quote(db_name_raw, safe="")

        os.environ["MONGO_URL"] = (
            f"mongodb://{username}:{password}@mongo:27017/{db_name}"
            f"?authSource={db_name}&replicaSet=rs0"
        )

        os.setgroups([])
        os.setgid(APP_GID)
        os.setuid(APP_UID)

        if (
            os.getuid() != APP_UID
            or os.geteuid() != APP_UID
            or os.getgid() != APP_GID
            or os.getegid() != APP_GID
        ):
            raise RuntimeError(
                "Backend privilege drop to appuser failed."
            )

        os.execvp(
            "python",
            [
                "python",
                "-m",
                "uvicorn",
                "server:app",
                "--host",
                "0.0.0.0",
                "--port",
                "8000",
                "--workers",
                "1",
                "--proxy-headers",
                "--forwarded-allow-ips=*",
            ],
        )

    networks:
      - application
      - data

    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import os, sys, urllib.request as u;
          os.setgroups([]);
          os.setgid(10001);
          os.setuid(10001);
          r = u.urlopen('http://127.0.0.1:8000/api/', timeout=2);
          sys.exit(0 if r.status == 200 else 1)
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 30s

    stop_grace_period: 30s
    logging: *default-logging

    cap_add:
      - SETGID
      - SETUID

    cap_drop:
      - ALL

    security_opt:
      - no-new-privileges:true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: ""

    image: "app2-frontend:${APP_IMAGE_TAG:-local}"
    restart: unless-stopped

    depends_on:
      backend:
        condition: service_healthy

    # Internal application hop only. No frontend host port is published.

    networks:
      - application

    healthcheck:
      test:
        - CMD
        - wget
        - -q
        - --spider
        - http://127.0.0.1:8080/healthz
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s

    stop_grace_period: 15s
    logging: *default-logging

    security_opt:
      - no-new-privileges:true

  tls-edge:
    image: nginxinc/nginx-unprivileged:1.30.4-alpine@sha256:dcb6a40a82e08e071f696805a23b45d5bb6582a7508509930d3035b16b441069
    user: "0:0"
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - |
        set -eu

        install -d -m 0700 /tmp/app2-tls
        install -d -m 0755 /tmp/app2-nginx
        install -d -m 0755 /tmp/app2-nginx/conf.d

        cp \
          /run/secrets/tls_certificate \
          /tmp/app2-tls/tls-certificate.pem

        cp \
          /run/secrets/tls_private_key \
          /tmp/app2-tls/tls-private.key

        chmod 0400 /tmp/app2-tls/tls-certificate.pem
        chmod 0400 /tmp/app2-tls/tls-private.key

        cp \
          /etc/nginx/nginx.conf \
          /tmp/app2-nginx/nginx.conf

        cp \
          /etc/nginx/conf.d/default.conf \
          /tmp/app2-nginx/conf.d/default.conf

        sed -i \
          's#^[[:space:]]*error_log[[:space:]][^;]*;#error_log stderr notice;#' \
          /tmp/app2-nginx/nginx.conf

        sed -i \
          's#^[[:space:]]*access_log[[:space:]][^;]*;#access_log /tmp/app2-nginx/access.log main;#' \
          /tmp/app2-nginx/nginx.conf

        grep -F \
          'error_log stderr notice;' \
          /tmp/app2-nginx/nginx.conf \
          >/dev/null

        grep -F \
          'access_log /tmp/app2-nginx/access.log main;' \
          /tmp/app2-nginx/nginx.conf \
          >/dev/null

        sed -i \
          's#/run/secrets/tls_certificate#/tmp/app2-tls/tls-certificate.pem#g' \
          /tmp/app2-nginx/conf.d/default.conf

        sed -i \
          's#/run/secrets/tls_private_key#/tmp/app2-tls/tls-private.key#g' \
          /tmp/app2-nginx/conf.d/default.conf

        sed -i \
          's#/etc/nginx/conf.d/\*\.conf#/tmp/app2-nginx/conf.d/*.conf#g' \
          /tmp/app2-nginx/nginx.conf

        grep -F \
          '/tmp/app2-tls/tls-certificate.pem' \
          /tmp/app2-nginx/conf.d/default.conf \
          >/dev/null

        grep -F \
          '/tmp/app2-tls/tls-private.key' \
          /tmp/app2-nginx/conf.d/default.conf \
          >/dev/null

        grep -F \
          'include /tmp/app2-nginx/conf.d/*.conf;' \
          /tmp/app2-nginx/nginx.conf \
          >/dev/null

        chmod 0444 /tmp/app2-nginx/nginx.conf
        chmod 0444 /tmp/app2-nginx/conf.d/default.conf

        chown 101:0 /tmp/app2-tls/tls-certificate.pem
        chown 101:0 /tmp/app2-tls/tls-private.key
        chown 101:0 /tmp/app2-nginx/nginx.conf
        chown 101:0 /tmp/app2-nginx/conf.d/default.conf

        chown 101:0 /tmp/app2-nginx/conf.d
        chown 101:0 /tmp/app2-nginx
        chown 101:0 /tmp/app2-tls

        exec su \
          -s /bin/sh \
          nginx \
          -c 'exec nginx -c /tmp/app2-nginx/nginx.conf -g "daemon off;"'
    restart: unless-stopped

    depends_on:
      frontend:
        condition: service_healthy

    secrets:
      - source: tls_certificate
        target: tls_certificate
      - source: tls_private_key
        target: tls_private_key

    volumes:
      - type: bind
        source: ./deploy/tls/nginx.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true

    ports:
      - "${HTTPS_BIND_ADDRESS:-127.0.0.1}:${HTTPS_PORT:-443}:8443"

    networks:
      - application

    healthcheck:
      test:
        - CMD-SHELL
        - >-
          wget
          --quiet
          --no-check-certificate
          --spider
          https://127.0.0.1:8443/healthz
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

    read_only: true

    tmpfs:
      - /tmp:size=32m,mode=1777

    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    cap_drop:
      - ALL

    stop_grace_period: 15s
    logging: *default-logging

    security_opt:
      - no-new-privileges:true
networks:

  application:
    driver: bridge

  data:
    driver: bridge
    internal: true

volumes:

  mongo_data:
    name: "${MONGO_DATA_VOLUME_NAME:-app2-production-mongo-data}"

  mongo_config:
    name: "${MONGO_CONFIG_VOLUME_NAME:-app2-production-mongo-config}"

secrets:

  mongo_root_username:
    file: "${MONGO_ROOT_USERNAME_FILE:?MONGO_ROOT_USERNAME_FILE must point to a secret file}"

  mongo_root_password:
    file: "${MONGO_ROOT_PASSWORD_FILE:?MONGO_ROOT_PASSWORD_FILE must point to a secret file}"

  mongo_app_username:
    file: "${MONGO_APP_USERNAME_FILE:?MONGO_APP_USERNAME_FILE must point to a secret file}"

  mongo_app_password:
    file: "${MONGO_APP_PASSWORD_FILE:?MONGO_APP_PASSWORD_FILE must point to a secret file}"

  mongo_replica_set_key:
    file: "${MONGO_REPLICA_SET_KEY_FILE:?MONGO_REPLICA_SET_KEY_FILE must point to a secret file}"
  tls_certificate:
    file: "${TLS_CERTIFICATE_FILE:?TLS_CERTIFICATE_FILE must point to a PEM certificate-chain file}"

  tls_private_key:
    file: "${TLS_PRIVATE_KEY_FILE:?TLS_PRIVATE_KEY_FILE must point to an unencrypted PEM private-key file}"
