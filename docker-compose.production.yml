# Docker Compose  authenticated production stack.
#
# Production Package 4:
# - Enables MongoDB keyfile authentication for the single-node rs0 replica set.
# - Creates a root administration user only for initialization and maintenance.
# - Creates or updates a dedicated application user with readWrite access only
#   to DB_NAME.
# - Supplies credentials through service-scoped, file-backed Compose secrets.
# - Keeps MongoDB and backend ports unpublished.
# - Persists /data/db and /data/configdb in explicitly named Docker volumes.
#
# The single-node replica set enables multi-document transactions but provides
# no high availability or automatic failover. That infrastructure limitation
# requires separate documented risk acceptance before pilot deployment.
#
# Prepare local secret files:
#   powershell -NoProfile -ExecutionPolicy Bypass `
#     -File .\deploy\mongo\prepare-secrets.ps1
#
# Then:
#   Copy-Item .env.production.example .env.production
#   # Populate JWT_SECRET and review every variable.
#   docker compose --env-file .env.production `
#     -f docker-compose.production.yml config
#   docker compose --env-file .env.production `
#     -f docker-compose.production.yml up -d --build
#
# Never use prepare-secrets.ps1 -Force against a populated production volume.
# Rotating the MongoDB root password requires an authenticated database
# operation; replacing only the secret file does not update an existing user.
#
# Package 5 replaces the temporary loopback HTTP ingress with the TLS edge
# reverse proxy. Package 7 adds backup, restore, and restore-drill tooling.

x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "${LOG_MAX_SIZE:-10m}"
    max-file: "${LOG_MAX_FILES:-5}"

services:

  mongo:
    image: mongo:8.0@sha256:721f8fe7ae88f6acee8c163a358f726cef6dfc4181b9d3ca77212a0cef6b781c

    # Compose file-backed secrets are normally mounted read-only with host-side
    # ownership. MongoDB requires a private keyfile, so copy it into the
    # container's ephemeral filesystem and enforce ownership/mode before
    # invoking the official image entrypoint.
    entrypoint:
      - bash
      - -ec
      - |
        set -Eeuo pipefail

        key_source=/run/secrets/mongo_replica_set_key
        key_dir=/tmp/app2-mongo-keyfile
        key_target="$${key_dir}/keyfile"

        test -s "$$key_source"

        rm -rf "$$key_dir"
        mkdir -p "$$key_dir"
        cp "$$key_source" "$$key_target"

        chown -R mongodb:mongodb "$$key_dir"
        chmod 700 "$$key_dir"
        chmod 400 "$$key_target"

        exec docker-entrypoint.sh mongod \
          --replSet rs0 \
          --bind_ip_all \
          --keyFile "$$key_target"

    environment:
      MONGO_INITDB_ROOT_USERNAME_FILE: /run/secrets/mongo_root_username
      MONGO_INITDB_ROOT_PASSWORD_FILE: /run/secrets/mongo_root_password

    secrets:
      - source: mongo_root_username
        target: mongo_root_username
      - source: mongo_root_password
        target: mongo_root_password
      - source: mongo_replica_set_key
        target: mongo_replica_set_key

    restart: unless-stopped

    volumes:
      - type: volume
        source: mongo_data
        target: /data/db
        volume:
          nocopy: true

      - type: volume
        source: mongo_config
        target: /data/configdb
        volume:
          nocopy: true

    networks:
      - data

    healthcheck:
      test:
        - CMD-SHELL
        - >-
          root_user="$$(cat /run/secrets/mongo_root_username)" &&
          root_password="$$(cat /run/secrets/mongo_root_password)" &&
          mongosh
          --host 127.0.0.1
          --port 27017
          --username "$$root_user"
          --password "$$root_password"
          --authenticationDatabase admin
          --quiet
          --eval "db.adminCommand({ ping: 1 }).ok"
          | grep -q 1
      interval: 5s
      timeout: 10s
      retries: 36
      start_period: 20s

    stop_grace_period: 60s
    logging: *default-logging

    security_opt:
      - no-new-privileges:true

  mongo-init:
    image: mongo:8.0@sha256:721f8fe7ae88f6acee8c163a358f726cef6dfc4181b9d3ca77212a0cef6b781c

    depends_on:
      mongo:
        condition: service_healthy

    environment:
      DB_NAME: "${DB_NAME:-medstock}"

    secrets:
      - source: mongo_root_username
        target: mongo_root_username
      - source: mongo_root_password
        target: mongo_root_password
      - source: mongo_app_username
        target: mongo_app_username
      - source: mongo_app_password
        target: mongo_app_password

    command:
      - bash
      - -ec
      - |
        set -Eeuo pipefail

        root_user="$$(cat /run/secrets/mongo_root_username)"
        root_password="$$(cat /run/secrets/mongo_root_password)"
        app_user="$$(cat /run/secrets/mongo_app_username)"
        app_password="$$(cat /run/secrets/mongo_app_password)"

        test -n "$$root_user"
        test -n "$$root_password"
        test -n "$$app_user"
        test -n "$$app_password"
        test -n "$$DB_NAME"

        export APP_DB="$$DB_NAME"
        export APP_USER="$$app_user"
        export APP_PASSWORD="$$app_password"

        root_mongosh() {
          mongosh \
            --host mongo \
            --port 27017 \
            --username "$$root_user" \
            --password "$$root_password" \
            --authenticationDatabase admin \
            --quiet \
            "$$@"
        }

        rs_ready="$$(root_mongosh --eval '
          try {
            print(rs.status().ok);
          } catch (error) {
            if (
              error.code === 94 ||
              error.codeName === "NotYetInitialized"
            ) {
              print(0);
            } else {
              throw error;
            }
          }
        ' | tail -n 1)"

        if [ "$$rs_ready" != "1" ]; then
          root_mongosh --eval '
            rs.initiate({
              _id: "rs0",
              members: [
                { _id: 0, host: "mongo:27017" }
              ]
            });
          '
        fi

        until [ "$$(root_mongosh --eval '
          print(db.hello().isWritablePrimary);
        ' | tail -n 1)" = "true" ]
        do
          sleep 1
        done

        root_mongosh "$$APP_DB" --eval '
          const target = db.getSiblingDB(process.env.APP_DB);
          const user = process.env.APP_USER;
          const password = process.env.APP_PASSWORD;
          const roles = [
            {
              role: "readWrite",
              db: process.env.APP_DB
            }
          ];

          const existing = target.getUser(user);

          if (!existing) {
            target.createUser({
              user,
              pwd: password,
              roles
            });
          } else {
            target.updateUser(user, {
              pwd: password,
              roles
            });
          }
        '

        mongosh \
          --host mongo \
          --port 27017 \
          --username "$$app_user" \
          --password "$$app_password" \
          --authenticationDatabase "$$APP_DB" \
          "$$APP_DB" \
          --quiet \
          --eval '
            const status = db.runCommand({
              connectionStatus: 1
            });

            const expectedDb = process.env.APP_DB;

            const rolePresent =
              status.authInfo.authenticatedUserRoles.some(
                role =>
                  role.role === "readWrite" &&
                  role.db === expectedDb
              );

            if (!rolePresent) {
              throw new Error(
                "Application user does not have the expected scoped role."
              );
            }
          '

        echo "rs0 PRIMARY and scoped application user ready"

    restart: "no"

    networks:
      - data

    logging: *default-logging

    security_opt:
      - no-new-privileges:true

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    image: "app2-backend:${APP_IMAGE_TAG:-local}"
    restart: unless-stopped

    # Exactly one backend process/container is permitted. The image starts one
    # Uvicorn worker because scheduler/reconciliation loops lack leader
    # election. Do not scale this service until that limitation is resolved.
    deploy:
      replicas: 1

    depends_on:
      mongo-init:
        condition: service_completed_successfully

    environment:
      APP_ENV: production
      DB_NAME: "${DB_NAME:-medstock}"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set in .env.production}"
      COOKIE_SECURE: "${COOKIE_SECURE:-true}"
      COOKIE_SAMESITE: "${COOKIE_SAMESITE:-lax}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-}"
      SEED_DATA_ENABLED: "false"
      ADMIN_EMAIL: ""
      ADMIN_PASSWORD: ""
      TRANSACTION_TEST_HOOKS_ENABLED: "false"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      SENDER_EMAIL: "${SENDER_EMAIL:-onboarding@resend.dev}"
      APP_URL: "${APP_URL:-}"

    secrets:
      - source: mongo_app_username
        target: mongo_app_username
      - source: mongo_app_password
        target: mongo_app_password

    # Construct the authenticated URI inside the running container instead of
    # placing the password in Compose environment metadata. os.execvp replaces
    # the wrapper with Uvicorn so Uvicorn remains PID 1 and receives SIGTERM.
    command:
      - python
      - -c
      - |
        import os
        from pathlib import Path
        from urllib.parse import quote

        def read_secret(path: str) -> str:
            value = Path(path).read_text(encoding="utf-8").strip()
            if not value:
                raise RuntimeError(f"Required secret is empty: {path}")
            return value

        username = quote(
            read_secret("/run/secrets/mongo_app_username"),
            safe="",
        )
        password = quote(
            read_secret("/run/secrets/mongo_app_password"),
            safe="",
        )
        db_name_raw = os.environ["DB_NAME"].strip()

        if not db_name_raw:
            raise RuntimeError("DB_NAME is empty.")

        db_name = quote(db_name_raw, safe="")

        os.environ["MONGO_URL"] = (
            f"mongodb://{username}:{password}@mongo:27017/{db_name}"
            f"?authSource={db_name}&replicaSet=rs0"
        )

        os.execvp(
            "python",
            [
                "python",
                "-m",
                "uvicorn",
                "server:app",
                "--host",
                "0.0.0.0",
                "--port",
                "8000",
                "--workers",
                "1",
                "--proxy-headers",
                "--forwarded-allow-ips=*",
            ],
        )

    networks:
      - application
      - data

    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import sys, urllib.request as u;
          r = u.urlopen('http://127.0.0.1:8000/api/', timeout=2);
          sys.exit(0 if r.status == 200 else 1)
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 30s

    stop_grace_period: 30s
    logging: *default-logging

    security_opt:
      - no-new-privileges:true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: ""

    image: "app2-frontend:${APP_IMAGE_TAG:-local}"
    restart: unless-stopped

    depends_on:
      backend:
        condition: service_healthy

    # Temporary Package 3/4 ingress. Package 5 replaces this loopback HTTP
    # binding with the TLS reverse-proxy service and publishes HTTPS only.
    ports:
      - "${APP_BIND_ADDRESS:-127.0.0.1}:${APP_HTTP_PORT:-8080}:8080"

    networks:
      - application

    healthcheck:
      test:
        - CMD
        - wget
        - -q
        - --spider
        - http://127.0.0.1:8080/healthz
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s

    stop_grace_period: 15s
    logging: *default-logging

    security_opt:
      - no-new-privileges:true

networks:

  application:
    driver: bridge

  data:
    driver: bridge
    internal: true

volumes:

  mongo_data:
    name: "${MONGO_DATA_VOLUME_NAME:-app2-production-mongo-data}"

  mongo_config:
    name: "${MONGO_CONFIG_VOLUME_NAME:-app2-production-mongo-config}"

secrets:

  mongo_root_username:
    file: "${MONGO_ROOT_USERNAME_FILE:?MONGO_ROOT_USERNAME_FILE must point to a secret file}"

  mongo_root_password:
    file: "${MONGO_ROOT_PASSWORD_FILE:?MONGO_ROOT_PASSWORD_FILE must point to a secret file}"

  mongo_app_username:
    file: "${MONGO_APP_USERNAME_FILE:?MONGO_APP_USERNAME_FILE must point to a secret file}"

  mongo_app_password:
    file: "${MONGO_APP_PASSWORD_FILE:?MONGO_APP_PASSWORD_FILE must point to a secret file}"

  mongo_replica_set_key:
    file: "${MONGO_REPLICA_SET_KEY_FILE:?MONGO_REPLICA_SET_KEY_FILE must point to a secret file}"
